<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil - Red Social</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
  <div class="container mt-5 d-flex justify-content-center">
    <div class="card profile-card shadow-lg p-4 text-center">
      <!-- Imagen de perfil -->
      <div class="profile-img-wrapper mb-3">
        <img src="assets/profile.png" alt="Foto de perfil" class="profile-img">
      </div>
      <!-- Nombre -->
      <h3 class="fw-bold text-primary">Juan Pérez</h3>
      <!-- Descripción -->
      <p class="text-muted">Explorador de aventuras y amante del futbol</p>
      <hr>
      <!-- Frase inspiradora -->
      <h5 class="mt-3 text-info fst-italic">“Aprendiendo cada día”</h5>
      <!-- Botón interactivo -->
      <button class="btn btn-outline-primary mt-4 profile-btn">Editar perfil</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
