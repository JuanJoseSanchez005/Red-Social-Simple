<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mockup Galería</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
  <header class="mockup-header">
    <h1 class="logo">Mi Red Social</h1>
    <nav>
      <ul class="nav-links">
        <li><a href="home.html">Inicio</a></li>
        <li><a href="profile.html">Perfil</a></li>
        <li><a href="gallery-mockup.html">Galería</a></li>
      </ul>
    </nav>
  </header>

  <main class="container mt-4">
    <h2 class="text-primary mb-4">Galería de imágenes</h2>
    <div class="row g-4">
      <div class="col-md-4">
        <div id="galleryContainer" class="card shadow-sm">
          <img src="assets/paseo1.jpg" class="card-img-top" alt="Imagen 1">
          <div class="card-body text-center">
            <h5 class="card-title">Auto</h5>
            <button class="btn btn-outline-primary">❤️ Me gusta</button>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm">
          <img src="assets/paseo2.jpg" class="card-img-top" alt="Imagen 2">
          <div class="card-body text-center">
            <h5 class="card-title">Caminata</h5>
            <button class="btn btn-outline-primary">❤️ Me gusta</button>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm">
          <img src="assets/paseo3.jpg" class="card-img-top" alt="Imagen 3">
          <div class="card-body text-center">
            <h5 class="card-title">Montaña</h5>
            <button class="btn btn-outline-primary">❤️ Me gusta</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
