<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframe Galería</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="wireframe-header">
    <h1>Mi Red Social</h1>
    <nav>
      <ul>
        <li>Inicio</li>
        <li>Perfil</li>
        <li>Galería</li>
      </ul>
    </nav>
  </header>

  <main class="wireframe-gallery">
    <h2>Galería de imágenes</h2>
    <div class="gallery-grid">
      <div class="gallery-item">Imagen 1</div>
      <div class="gallery-item">Imagen 2</div>
      <div class="gallery-item">Imagen 3</div>
      <div class="gallery-item">Imagen 4</div>
      <div class="gallery-item">Imagen 5</div>
      <div class="gallery-item">Imagen 6</div>
    </div>
  </main>
</body>
</html>
